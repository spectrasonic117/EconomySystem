# Plugin configuration
economy:
  # The currency symbol
  currency-symbol: "$"
  # The currency name
  currency-name: "Dollar"
  # Amount of money the player starts with
  start-balance: 100.0
  # Formato de visualización del dinero
  # DECIMAL_PLACES: 0 = solo enteros (1,500), 2 = dos decimales (1,500.00)
  decimal-places: 0

# Cache configuration
# El caché reduce la carga en la base de datos manteniendo saldos en memoria
cache:
  enabled: true
  # Intervalo en segundos entre flush automáticos a la base de datos
  flush-interval: 5
  # Número máximo de entradas a procesar en cada flush
  max-batch-size: 50
  # Tiempo en segundos antes de eliminar entradas inactivas de la caché (0 para desactivar)
  eviction-time: 300

# Database configuration
# The database is used to store the player's balance.
# TYPE: mariadb, litesql, url
database:
  type: litesql
  mariadb:
    host: "localhost"
    port: 3306
    database: "economy"
    username: "user"
    password: ""
  litesql:
    file: "economy.db"
  url:
    jdbc: "jdbc:mariadb://user:password@localhost:3306/economy"
